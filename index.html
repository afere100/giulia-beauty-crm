<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giulia Beauty CRM</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0b;
      --s1:#141416;
      --s2:#1c1c1f;
      --s3:#242428;
      --border:#2a2a30;
      --border2:#353540;
      --gold:#C9A84C;
      --gold2:#e0bc62;
      --golddim:rgba(201,168,76,.12);
      --text:#f2f2f3;
      --muted:#888;
      --muted2:#555;
      --green:#4caf7d;
      --red:#e05555;
      --blue:#5b9bd5;
      --purple:#9b72cf;
    }
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}

    /* ── HEADER ── */
    .header{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
    .logo{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:.3px}
    .logo span{color:var(--muted);font-weight:400;font-size:14px}
    .hdr-actions{display:flex;gap:8px}
    .icon-btn{background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;white-space:nowrap}
    .icon-btn:hover{border-color:var(--gold);color:var(--gold)}
    .add-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit;white-space:nowrap}
    .add-btn:hover{background:var(--gold2)}

    /* ── STATS ── */
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
    .stat{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:border-color .2s}
    .stat:hover{border-color:var(--gold)}
    .stat-value{font-size:20px;font-weight:800;color:var(--gold);line-height:1}
    .stat-label{font-size:10px;color:var(--muted);margin-top:3px}
    .stat-rev .stat-value{font-size:14px}

    /* ── SEARCH + FILTER ── */
    .search-wrap{position:relative;margin-bottom:10px}
    .search-input{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:10px 14px 10px 36px;color:var(--text);font-size:14px;font-family:inherit;direction:rtl;outline:none;transition:border-color .2s}
    .search-input:focus{border-color:var(--gold)}
    .search-input::placeholder{color:var(--muted2)}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none}
    .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filter-btn{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
    .filter-btn.active{background:var(--golddim);border-color:var(--gold);color:var(--gold);font-weight:600}

    /* ── MAIN ── */
    .main{padding:14px 16px;max-width:720px;margin:0 auto}
    .leads-count{font-size:12px;color:var(--muted);margin-bottom:10px}

    /* ── LEAD CARD ── */
    .lead-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
    .lead-card:hover{border-color:var(--border2)}
    .card-body{padding:14px 14px 10px}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
    .lead-info{flex:1;min-width:0}
    .lead-name{font-size:15px;font-weight:700;margin-bottom:3px;color:var(--text)}
    .lead-sub{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
    .lead-sub span{display:flex;align-items:center;gap:3px}
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
    .badge-new      {background:rgba(91,155,213,.12);color:#5b9bd5;border:1px solid rgba(91,155,213,.25)}
    .badge-contacted{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
    .badge-interested{background:rgba(155,114,207,.12);color:var(--purple);border:1px solid rgba(155,114,207,.25)}
    .badge-booked   {background:rgba(76,175,125,.12);color:var(--green);border:1px solid rgba(76,175,125,.25)}
    .badge-client   {background:rgba(76,175,125,.2);color:#6fcf97;border:1px solid rgba(111,207,151,.35)}
    .badge-lost     {background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.25)}

    /* ── PAYMENT BAR ── */
    .payment-bar{background:var(--s2);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .pay-info{display:flex;gap:16px;font-size:12px}
    .pay-info span{color:var(--muted)}
    .pay-info strong{color:var(--text)}
    .pay-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
    .pay-pending  {background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.25)}
    .pay-partial  {background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
    .pay-paid     {background:rgba(76,175,125,.12);color:var(--green);border:1px solid rgba(76,175,125,.25)}
    .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .4s ease}

    /* ── CARD ACTIONS ── */
    .card-actions{border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:var(--s1)}
    .action-btn{border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:4px}
    .btn-call{background:rgba(76,175,125,.12);color:var(--green);border:1px solid rgba(76,175,125,.25)}
    .btn-call:hover{background:rgba(76,175,125,.25)}
    .btn-wa{background:rgba(37,211,102,.08);color:#25d366;border:1px solid rgba(37,211,102,.25)}
    .btn-wa:hover{background:rgba(37,211,102,.2)}
    .btn-pay{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
    .btn-pay:hover{background:rgba(201,168,76,.25)}
    .btn-inv{background:rgba(91,155,213,.1);color:var(--blue);border:1px solid rgba(91,155,213,.25)}
    .btn-inv:hover{background:rgba(91,155,213,.2)}
    .btn-edit{background:var(--s3);color:var(--muted);border:1px solid var(--border)}
    .btn-edit:hover{border-color:var(--gold);color:var(--gold)}
    .btn-del{background:rgba(224,85,85,.08);color:var(--red);border:1px solid rgba(224,85,85,.2);margin-right:auto}
    .btn-del:hover{background:rgba(224,85,85,.2)}
    .status-select{background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 10px;font-size:12px;font-family:inherit;cursor:pointer;outline:none;direction:rtl}
    .status-select:focus{border-color:var(--gold)}

    /* ── NOTES ── */
    .card-notes{margin:0 14px 10px;font-size:12px;color:var(--muted);background:var(--s2);border-radius:6px;padding:8px 10px;line-height:1.5;border-right:3px solid var(--border2)}
    .card-notes.source-meta{border-right-color:var(--blue)}

    /* ── EMPTY / LOADING ── */
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{font-size:44px;margin-bottom:10px}
    .empty-title{font-size:15px;margin-bottom:5px;color:var(--text)}
    .loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
    .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── OVERLAY / MODAL ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:620px;padding:22px 18px 36px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease;direction:rtl}
    .overlay.open .modal{transform:translateY(0)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .modal-title{font-size:17px;font-weight:800;color:var(--gold)}
    .close-btn{background:var(--s3);border:1px solid var(--border);color:var(--muted);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
    .close-btn:hover{color:var(--text)}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;direction:rtl;outline:none;transition:border-color .2s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold)}
    .form-input::placeholder{color:var(--muted2)}
    .form-textarea{resize:vertical;min-height:72px}
    .form-select option{background:var(--s2)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .submit-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;transition:background .2s}
    .submit-btn:hover{background:var(--gold2)}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .section-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
    .section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

    /* ── PAYMENT MODAL ── */
    .pay-amount-display{text-align:center;padding:18px;background:var(--s2);border-radius:12px;margin-bottom:16px}
    .pay-amount-display .label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .pay-amount-display .total{font-size:28px;font-weight:800;color:var(--gold)}
    .pay-amount-display .paid{font-size:14px;color:var(--green);margin-top:4px}
    .quick-pay-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .qpay-btn{flex:1;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-width:60px;transition:all .2s;text-align:center}
    .qpay-btn:hover{border-color:var(--gold);color:var(--gold)}

    /* ── INVOICE MODAL ── */
    .invoice{background:#fff;color:#000;padding:28px;border-radius:8px;font-family:'Segoe UI',sans-serif;direction:rtl;max-width:480px;margin:0 auto}
    .inv-header{text-align:center;margin-bottom:20px;border-bottom:2px solid #C9A84C;padding-bottom:16px}
    .inv-salon{font-size:22px;font-weight:800;color:#C9A84C}
    .inv-sub{font-size:12px;color:#888;margin-top:4px}
    .inv-title{font-size:16px;font-weight:700;margin:14px 0 12px;color:#222}
    .inv-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
    .inv-row:last-child{border-bottom:none}
    .inv-total{font-size:16px;font-weight:800;color:#222;border-top:2px solid #C9A84C;padding-top:12px;margin-top:8px}
    .inv-paid{color:#4caf7d;font-weight:700}
    .inv-footer{text-align:center;margin-top:20px;font-size:11px;color:#aaa;border-top:1px solid #f0f0f0;padding-top:12px}
    .inv-stamp{display:inline-block;border:2px solid #4caf7d;color:#4caf7d;border-radius:4px;padding:4px 14px;font-weight:800;font-size:14px;transform:rotate(-5deg);margin-top:10px}
    .print-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}

    /* ── PRICING TABLE MODAL ── */
    .price-table{width:100%}
    .price-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .price-row:last-child{border-bottom:none}
    .price-service{flex:1;font-size:14px;font-weight:600}
    .price-input{width:110px;background:var(--s3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;text-align:left;direction:ltr}
    .price-input:focus{border-color:var(--gold)}
    .price-currency{font-size:12px;color:var(--muted)}

    /* ── CONFIRM DIALOG ── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .confirm-overlay.open{opacity:1;pointer-events:all}
    .confirm-box{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px 20px;max-width:320px;width:100%;text-align:center;direction:rtl}
    .confirm-icon{font-size:34px;margin-bottom:10px}
    .confirm-title{font-size:15px;font-weight:700;margin-bottom:7px}
    .confirm-msg{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
    .confirm-actions{display:flex;gap:10px}
    .confirm-cancel{flex:1;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600}
    .confirm-ok{flex:1;background:var(--red);border:none;color:#fff;border-radius:8px;padding:11px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600}

    /* ── TOAST ── */
    .toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;gap:7px;pointer-events:none;min-width:240px}
    .toast{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:slideUp .3s ease,fadeOut .4s ease 2.3s forwards;white-space:nowrap}
    .toast.success{border-color:var(--green);color:var(--green)}
    .toast.error{border-color:var(--red);color:var(--red)}
    .toast.info{border-color:var(--gold);color:var(--gold)}
    @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}

    /* ── META BADGE ── */
    .meta-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(24,119,242,.12);color:#1877f2;border:1px solid rgba(24,119,242,.25)}

    @media(max-width:480px){
      .stats{grid-template-columns:repeat(3,1fr)}
      .stat-rev{display:none}
      .form-row,.form-row-3{grid-template-columns:1fr}
      .card-actions{gap:5px}
      .action-btn{padding:7px 9px;font-size:11px}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo">Giulia Beauty <span>CRM</span></div>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="openPricingModal()">💰 الأسعار</button>
      <button class="add-btn" onclick="openLeadModal()">+ عميلة</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat" onclick="setFilter('all',document.querySelector('[data-status=all]'))">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">الإجمالي</div>
    </div>
    <div class="stat" onclick="setFilter('new',document.querySelector('[data-status=new]'))">
      <div class="stat-value" id="stat-new">—</div>
      <div class="stat-label">جديد</div>
    </div>
    <div class="stat" onclick="setFilter('booked',document.querySelector('[data-status=booked]'))">
      <div class="stat-value" id="stat-booked">—</div>
      <div class="stat-label">محجوز</div>
    </div>
    <div class="stat" onclick="setFilter('client',document.querySelector('[data-status=client]'))">
      <div class="stat-value" id="stat-client">—</div>
      <div class="stat-label">عميلة</div>
    </div>
    <div class="stat stat-rev">
      <div class="stat-value" id="stat-rev">—</div>
      <div class="stat-label">المداخيل</div>
    </div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="البحث بالاسم أو الهاتف..." oninput="renderLeads()" />
    <span class="search-icon">🔍</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-status="all"        onclick="setFilter('all',this)">الكل</button>
    <button class="filter-btn"        data-status="new"        onclick="setFilter('new',this)">جديد</button>
    <button class="filter-btn"        data-status="contacted"  onclick="setFilter('contacted',this)">تم الاتصال</button>
    <button class="filter-btn"        data-status="interested" onclick="setFilter('interested',this)">مهتمة</button>
    <button class="filter-btn"        data-status="booked"     onclick="setFilter('booked',this)">محجوز</button>
    <button class="filter-btn"        data-status="client"     onclick="setFilter('client',this)">عميلة</button>
    <button class="filter-btn"        data-status="lost"       onclick="setFilter('lost',this)">مفقود</button>
    <button class="filter-btn"        data-status="paid"       onclick="setFilter('paid',this)">💰 مدفوع</button>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="leads-count" id="leadsCount"></div>
  <div id="leadsList"></div>
</main>

<!-- ADD/EDIT LEAD MODAL -->
<div class="overlay" id="leadOverlay" onclick="handleOverlay(event,'leadOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="leadModalTitle">إضافة عميلة جديدة</div>
      <button class="close-btn" onclick="closeModal('leadOverlay')">✕</button>
    </div>
    <form id="leadForm" onsubmit="submitLead(event)">
      <input type="hidden" id="editId" />
      <div class="section-title">بيانات العميلة</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">الاسم الكامل *</label>
          <input class="form-input" id="fName" required placeholder="سارة أحمد" />
        </div>
        <div class="form-group">
          <label class="form-label">رقم الهاتف</label>
          <input class="form-input" id="fPhone" placeholder="0612345678" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">الخدمة</label>
          <select class="form-select" id="fService" onchange="autofillPrice()">
            <option value="">اختر الخدمة</option>
            <option value="عروس">👰 عروس</option>
            <option value="كوافير">💇 كوافير</option>
            <option value="ميكياج">💄 ميكياج</option>
            <option value="مانيكير">💅 مانيكير</option>
            <option value="عناية بالبشرة">✨ عناية بالبشرة</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">الحالة</label>
          <select class="form-select" id="fStatus">
            <option value="new">جديد</option>
            <option value="contacted">تم الاتصال</option>
            <option value="interested">مهتمة</option>
            <option value="booked">محجوز</option>
            <option value="client">عميلة</option>
            <option value="lost">مفقود</option>
          </select>
        </div>
      </div>
      <hr class="section-divider" />
      <div class="section-title">الدفع</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">السعر الإجمالي (درهم)</label>
          <input class="form-input" id="fPrice" type="number" min="0" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">المبلغ المدفوع (درهم)</label>
          <input class="form-input" id="fPaid" type="number" min="0" placeholder="0" />
        </div>
      </div>
      <hr class="section-divider" />
      <div class="form-group">
        <label class="form-label">ملاحظات</label>
        <textarea class="form-textarea" id="fNotes" placeholder="أي معلومات إضافية..."></textarea>
      </div>
      <button class="submit-btn" type="submit" id="leadSubmitBtn">حفظ العميلة</button>
    </form>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div class="overlay" id="payOverlay" onclick="handleOverlay(event,'payOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">💰 تسجيل دفعة</div>

    <div class="pay-amount-display">
      <div class="label">إجمالي الفاتورة</div>
      <div class="total" id="payTotal">0 درهم</div>
      <div class="paid" id="payAlreadyPaid">مدفوع: 0 درهم</div>
    </div>
    <div class="form-group">
      <label class="form-label">دفعة سريعة</label>
      <div class="quick-pay-btns" id="quickPayBtns"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">مبلغ الدفعة (درهم)</label>
        <input class="form-input" id="payAmount" type="number" min="0" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">طريقة الدفع</label>
        <select class="form-select" id="payMethod">
          <option value="نقدي">نقدي</option>

          <option value="بطاقة">بطاقة</option>
        </select>
      </div>

    <button class="submit-btn" onclick="submitPayment()">✅ تأكيد الدفعة</button>
  </div>
</div>

<!-- INVOICE MODAL -->
<div class="overlay" id="invOverlay" onclick="handleOverlay(event,'invOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🧾 الفاتورة</div>
      <button class="close-btn" onclick="closeModal('invOverlay')">✕</button>
    </div>
    <div id="invoiceContent"></div>
    <button class="print-btn" onclick="printInvoice()">🖨️ طباعة / حفظ PDF</button>

<!-- PRICING TABLE MODAL -->
<div class="overlay" id="priceOverlay" onclick="handleOverlay(event,'priceOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">💰 قائمة الأسعار</div>

    <div class="price-table" id="priceTable"></div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">حذف العميلة</div>
    <div class="confirm-msg" id="confirmMsg">هل أنت متأكدة؟</div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">إلغاء</button>
      <button class="confirm-ok" id="confirmBtn">حذف</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SB_URL  = 'https://brohjgataiwbrosaqxmc.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyb2hqZ2F0YWl3YnJvc2FxeG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTYzNTQsImV4cCI6MjA5NDQzMjM1NH0.BtG1UByuFln0ocWL80xlCI8eoAWRd4E2vXFa8LFuePM';
const HDR = { 'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation' };

// ── STATE ─────────────────────────────────────────────────────────────────────
let leads = [], prices = {}, activeFilter = 'all', pendingDeleteId = null;

const SVC_ICON = { 'عروس':'👰','كوافير':'💇','ميكياج':'💄','مانيكير':'💅','عناية بالبشرة':'✨' };
const STATUS_LABEL = { new:'جديد', contacted:'تم الاتصال', interested:'مهتمة', booked:'محجوز', client:'عميلة', lost:'مفقود' };
const PAY_LABEL = { pending:'غير مدفوع', partial:'دفعة جزئية', paid:'مدفوع بالكامل' };

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method, headers:{...HDR}, ...(body ? {body:JSON.stringify(body)} : {})
  });
  if(!r.ok) throw new Error(await r.text());
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  showLoading();
  try {
    const [leadsData, pricesData] = await Promise.all([
      api('leads?select=*&order=created_at.desc'),
      api('service_prices?select=*')
    ]);
    leads = leadsData || [];
    pricesData?.forEach(p => prices[p.service] = { id:p.id, price:p.price });
    renderLeads();
    updateStats();
  } catch(e) {
    toast('خطأ في الاتصال: '+e.message, 'error');
    document.getElementById('leadsList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">تعذر الاتصال بقاعدة البيانات</div></div>`;
  }
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const rev = leads.filter(l=>l.payment_status==='paid').reduce((s,l)=>s+(l.amount_paid||0),0);
  document.getElementById('stat-total').textContent  = leads.length;
  document.getElementById('stat-new').textContent    = leads.filter(l=>l.status==='new').length;
  document.getElementById('stat-booked').textContent = leads.filter(l=>l.status==='booked').length;
  document.getElementById('stat-client').textContent = leads.filter(l=>l.status==='client').length;
  document.getElementById('stat-rev').textContent    = rev >= 1000 ? (rev/1000).toFixed(1)+'k' : rev+' د';
}

// ── FILTER + SEARCH ───────────────────────────────────────────────────────────
function setFilter(s, btn) {
  activeFilter = s;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return leads.filter(l => {
    const mFilter = activeFilter==='all' ? true
      : activeFilter==='paid' ? l.payment_status==='paid'
      : l.status===activeFilter;
    const mSearch = !q || (l.name||'').toLowerCase().includes(q) || (l.phone||'').includes(q);
    return mFilter && mSearch;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('leadsList').innerHTML = `<div class="loading"><div class="spinner"></div>جاري التحميل...</div>`;
}

function renderLeads() {
  const list = getFiltered();
  document.getElementById('leadsCount').textContent = `${list.length} عميلة`;
  const el = document.getElementById('leadsList');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">لا توجد نتائج</div><div>جربي بحثاً مختلفاً أو أضيفي عميلة</div></div>`;
    return;
  }
  el.innerHTML = list.map(l => cardHTML(l)).join('');
}

function cardHTML(l) {
  const date = l.created_at ? new Date(l.created_at).toLocaleDateString('ar-MA') : '';
  const icon = SVC_ICON[l.service] || '💁';
  const price = l.price || 0;
  const paid  = l.amount_paid || 0;
  const pct   = price > 0 ? Math.min(100, Math.round((paid/price)*100)) : 0;
  const pst   = l.payment_status || 'pending';
  const isFromMeta = l.source === 'meta_ads';

  return `
<div class="lead-card" id="card-${l.id}">
  <div class="card-body">
    <div class="card-top">
      <div class="lead-info">
        <div class="lead-name">${esc(l.name)}</div>
        <div class="lead-sub">
          ${l.service ? `<span>${icon} ${esc(l.service)}</span>` : ''}
          ${l.phone   ? `<span>📞 ${esc(l.phone)}</span>` : ''}
          ${date      ? `<span>📅 ${date}</span>` : ''}
          ${isFromMeta? `<span class="meta-badge">📘 Meta Ads</span>` : ''}
        </div>
      </div>
      <div class="card-right">
        <span class="status-badge badge-${l.status}">${STATUS_LABEL[l.status]||l.status}</span>
        ${price > 0 ? `<span class="pay-badge pay-${pst}">${PAY_LABEL[pst]}</span>` : ''}
      </div>
    </div>
    ${l.notes ? `<div class="card-notes${isFromMeta?' source-meta':''}">${esc(l.notes)}</div>` : ''}
  </div>

  ${price > 0 ? `
  <div class="payment-bar">
    <div class="pay-info">
      <span>💰 الإجمالي: <strong>${price} د</strong></span>
      <span>✅ مدفوع: <strong style="color:var(--green)">${paid} د</strong></span>
      <span>⏳ المتبقي: <strong style="color:var(--red)">${price-paid} د</strong></span>
    </div>
    <div style="font-size:11px;color:var(--muted)">${pct}%</div>
  </div>
  <div style="padding:0 14px 8px;background:var(--s2)">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>` : ''}

  <div class="card-actions">
    ${l.phone ? `<button class="action-btn btn-call" onclick="callLead('${esc(l.phone)}')">📞 اتصال</button>` : ''}
    ${l.phone ? `<button class="action-btn btn-wa"   onclick="whatsapp('${esc(l.phone)}')">💬 واتساب</button>` : ''}
    <button class="action-btn btn-pay" onclick="openPayModal('${l.id}')">💰 دفعة</button>
    <button class="action-btn btn-inv" onclick="openInvoice('${l.id}')">🧾 فاتورة</button>
    <select class="status-select" onchange="changeStatus('${l.id}',this.value)">
      <option value="new"        ${l.status==='new'?'selected':''}>جديد</option>
      <option value="contacted"  ${l.status==='contacted'?'selected':''}>تم الاتصال</option>
      <option value="interested" ${l.status==='interested'?'selected':''}>مهتمة</option>
      <option value="booked"     ${l.status==='booked'?'selected':''}>محجوز</option>
      <option value="client"     ${l.status==='client'?'selected':''}>عميلة</option>
      <option value="lost"       ${l.status==='lost'?'selected':''}>مفقود</option>
    </select>
    <button class="action-btn btn-edit" onclick="editLead('${l.id}')">✏️</button>
    <button class="action-btn btn-del"  onclick="confirmDelete('${l.id}','${esc(l.name)}')">🗑️</button>
  </div>
</div>`;
}

// ── LEAD MODAL ────────────────────────────────────────────────────────────────
function openLeadModal(lead=null) {
  document.getElementById('editId').value    = lead?.id || '';
  document.getElementById('fName').value     = lead?.name || '';
  document.getElementById('fPhone').value    = lead?.phone || '';
  document.getElementById('fService').value  = lead?.service || '';
  document.getElementById('fStatus').value   = lead?.status || 'new';
  document.getElementById('fPrice').value    = lead?.price || '';
  document.getElementById('fPaid').value     = lead?.amount_paid || '';
  document.getElementById('fNotes').value    = lead?.notes || '';
  document.getElementById('leadModalTitle').textContent = lead ? 'تعديل بيانات العميلة' : 'إضافة عميلة جديدة';
  document.getElementById('leadSubmitBtn').textContent  = lead ? 'حفظ التعديلات' : 'حفظ العميلة';
  openModal('leadOverlay');
  setTimeout(()=>document.getElementById('fName').focus(),300);
}

function autofillPrice() {
  const svc = document.getElementById('fService').value;
  if (svc && prices[svc] && !document.getElementById('editId').value) {
    const priceField = document.getElementById('fPrice');
    if (!priceField.value) priceField.value = prices[svc].price;
  }
}

function editLead(id) { openLeadModal(leads.find(l=>l.id===id)); }

async function submitLead(e) {
  e.preventDefault();
  const btn = document.getElementById('leadSubmitBtn');
  btn.disabled = true; btn.textContent = 'جاري الحفظ...';
  const id = document.getElementById('editId').value;
  const price     = parseFloat(document.getElementById('fPrice').value) || 0;
  const amtPaid   = parseFloat(document.getElementById('fPaid').value)  || 0;
  const payStatus = price === 0 ? 'pending' : amtPaid === 0 ? 'pending' : amtPaid >= price ? 'paid' : 'partial';
  const data = {
    name:           document.getElementById('fName').value.trim(),
    phone:          document.getElementById('fPhone').value.trim() || null,
    service:        document.getElementById('fService').value || null,
    status:         document.getElementById('fStatus').value,
    price,
    amount_paid:    amtPaid,
    payment_status: payStatus,
    notes:          document.getElementById('fNotes').value.trim() || null,
    updated_at:     new Date().toISOString()
  };
  try {
    if (id) {
      await api(`leads?id=eq.${id}`,'PATCH',data);
      const i = leads.findIndex(l=>l.id===id);
      if(i!==-1) leads[i]={...leads[i],...data};
      toast('✅ تم تحديث بيانات العميلة','success');
    } else {
      data.source = 'manual';
      const res = await api('leads','POST',data);
      if(res?.[0]) leads.unshift(res[0]);
      toast('✅ تمت إضافة العميلة','success');
    }
    closeModal('leadOverlay');
    renderLeads(); updateStats();
  } catch(err) { toast('❌ '+err.message,'error'); }
  finally { btn.disabled=false; }
}

// ── STATUS CHANGE ─────────────────────────────────────────────────────────────
async function changeStatus(id, s) {
  try {
    await api(`leads?id=eq.${id}`,'PATCH',{status:s,updated_at:new Date().toISOString()});
    const i=leads.findIndex(l=>l.id===id);
    if(i!==-1) leads[i].status=s;
    renderLeads(); updateStats();
    toast(`✅ الحالة: ${STATUS_LABEL[s]}`,'success');
  } catch(err) { toast('❌ فشل التحديث','error'); }
}

// ── PAYMENT MODAL ─────────────────────────────────────────────────────────────
function openPayModal(id) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  document.getElementById('payLeadId').value = id;
  document.getElementById('payTotal').textContent      = (l.price||0)+' درهم';
  document.getElementById('payAlreadyPaid').textContent= 'مدفوع: '+(l.amount_paid||0)+' درهم';
  document.getElementById('payAmount').value = '';
  // Quick pay buttons
  const rem = (l.price||0)-(l.amount_paid||0);
  const btns = document.getElementById('quickPayBtns');
  btns.innerHTML = [50,100,200,rem>0?rem:null].filter(Boolean).map(v=>
    `<button class="qpay-btn" onclick="document.getElementById('payAmount').value=${v}">${v} د</button>`
  ).join('');
  openModal('payOverlay');
}

async function submitPayment() {
  const id  = document.getElementById('payLeadId').value;
  const amt = parseFloat(document.getElementById('payAmount').value)||0;
  if(!amt || amt<=0) { toast('أدخلي مبلغاً صحيحاً','error'); return; }
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const newPaid   = Math.min((l.price||0), (l.amount_paid||0)+amt);
  const payStatus = newPaid>=(l.price||0) ? 'paid' : newPaid>0 ? 'partial' : 'pending';
  const notes     = l.notes
    ? l.notes+'\n'+new Date().toLocaleDateString('ar-MA')+': دُفع '+amt+' درهم ('+document.getElementById('payMethod').value+')'
    : new Date().toLocaleDateString('ar-MA')+': دُفع '+amt+' درهم ('+document.getElementById('payMethod').value+')';
  try {
    await api(`leads?id=eq.${id}`,'PATCH',{amount_paid:newPaid,payment_status:payStatus,notes,updated_at:new Date().toISOString()});
    const i=leads.findIndex(x=>x.id===id);
    if(i!==-1) Object.assign(leads[i],{amount_paid:newPaid,payment_status:payStatus,notes});
    closeModal('payOverlay');
    renderLeads(); updateStats();
    toast(`✅ تم تسجيل ${amt} درهم`,'success');
  } catch(err) { toast('❌ '+err.message,'error'); }
}

// ── INVOICE ───────────────────────────────────────────────────────────────────
function openInvoice(id) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const date = new Date().toLocaleDateString('ar-MA');
  const price = l.price||0, paid = l.amount_paid||0, rem = price-paid;
  const isPaid = l.payment_status==='paid';
  document.getElementById('invoiceContent').innerHTML = `
<div class="invoice" id="printArea">
  <div class="inv-header">
    <div class="inv-salon">Giulia Beauty Salon</div>
    <div class="inv-sub">فاس، المغرب &bull; خدمات التجميل</div>
  </div>
  <div class="inv-title">فاتورة خدمة</div>
  <div class="inv-row"><span>العميلة</span><span><b>${esc(l.name)}</b></span></div>
  <div class="inv-row"><span>الهاتف</span><span>${l.phone||'—'}</span></div>
  <div class="inv-row"><span>الخدمة</span><span>${l.service||'—'}</span></div>
  <div class="inv-row"><span>التاريخ</span><span>${date}</span></div>
  <div class="inv-row"><span>المصدر</span><span>${l.source==='meta_ads'?'Meta Ads':'مباشر'}</span></div>
  <br/>
  <div class="inv-row"><span>إجمالي الفاتورة</span><span><b>${price} درهم</b></span></div>
  <div class="inv-row"><span class="inv-paid">المبلغ المدفوع</span><span class="inv-paid">${paid} درهم</span></div>
  <div class="inv-row inv-total"><span>المبلغ المتبقي</span><span>${rem} درهم</span></div>
  <div style="text-align:center;margin-top:14px">
    ${isPaid ? '<div class="inv-stamp">✓ مدفوع بالكامل</div>' : ''}
  </div>
  <div class="inv-footer">شكراً على ثقتكم &bull; Giulia Beauty Salon</div>
</div>`;
  openModal('invOverlay');
}

function printInvoice() {
  const el = document.getElementById('printArea');
  const w  = window.open('','_blank','width=600,height=700');
  w.document.write(`<html><head><title>فاتورة</title>
<style>body{font-family:'Segoe UI',sans-serif;direction:rtl;padding:20px;background:#fff;color:#000}
${[...document.styleSheets].flatMap(s=>{try{return [...s.cssRules].map(r=>r.cssText)}catch{return[]}}).join('')}
</style></head><body>${el.outerHTML}<script>window.print();window.close();<\/script></body></html>`);
  w.document.close();
}

// ── PRICING TABLE MODAL ───────────────────────────────────────────────────────
function openPricingModal() {
  const services = ['عروس','كوافير','ميكياج','مانيكير','عناية بالبشرة'];
  const icons = SVC_ICON;
  document.getElementById('priceTable').innerHTML = services.map(s=>`
<div class="price-row">
  <div class="price-service">${icons[s]||''} ${s}</div>
  <input class="price-input" id="price_${s}" type="number" min="0" value="${prices[s]?.price||0}" placeholder="0" />
  <span class="price-currency">درهم</span>
</div>`).join('');
  openModal('priceOverlay');
}

async function savePrices() {
  const services = ['عروس','كوافير','ميكياج','مانيكير','عناية بالبشرة'];
  try {
    for (const s of services) {
      const val = parseFloat(document.getElementById('price_'+s).value)||0;
      if (prices[s]?.id) {
        await api(`service_prices?id=eq.${prices[s].id}`,'PATCH',{price:val,updated_at:new Date().toISOString()});
        prices[s].price = val;
      } else {
        const res = await api('service_prices','POST',{service:s,price:val});
        if(res?.[0]) prices[s]={id:res[0].id,price:val};
      }
    }
    toast('✅ تم حفظ الأسعار','success');
    closeModal('priceOverlay');
  } catch(err) { toast('❌ '+err.message,'error'); }
}

// ── DELETE ────────────────────────────────────────────────────────────────────
function confirmDelete(id, name) {
  pendingDeleteId = id;
  document.getElementById('confirmMsg').textContent = `هل أنت متأكدة من حذف "${name}"؟`;
  document.getElementById('confirmBtn').onclick = async () => {
    try {
      await api(`leads?id=eq.${pendingDeleteId}`,'DELETE');
      leads = leads.filter(l=>l.id!==pendingDeleteId);
      renderLeads(); updateStats(); closeConfirm();
      toast('🗑️ تم الحذف','info');
    } catch(err) { toast('❌ '+err.message,'error'); closeConfirm(); }
  };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); pendingDeleteId=null; }

// ── PHONE ACTIONS ─────────────────────────────────────────────────────────────
function callLead(p) { window.open('tel:'+p.replace(/\s/g,'')); toast('📞 جاري الاتصال...','info'); }
function whatsapp(p) {
  const c = p.replace(/[\s+\-()]/g,'');
  window.open(`https://wa.me/${c.startsWith('0')?'212'+c.slice(1):c}`,'_blank');
  toast('💬 فتح واتساب...','info');
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function handleOverlay(e, id) { if(e.target===document.getElementById(id)) closeModal(id); }

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const c=document.getElementById('toastContainer'), t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
